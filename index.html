<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SRE Dashboard | Hitendra</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🚀 SRE Control Panel</h1>
    <p>Monitoring | Kubernetes | Terraform | Ansible</p>
</header>

<div class="grid">

    <div class="card">
        <h3>CPU Usage</h3>
        <p id="cpu"></p>
    </div>

    <div class="card">
        <h3>Memory Usage</h3>
        <p id="memory"></p>
    </div>

    <div class="card">
        <h3>Disk Usage</h3>
        <p id="disk"></p>
    </div>

    <div class="card">
        <h3>Docker Containers</h3>
        <ul id="containers"></ul>
    </div>

    <div class="card">
        <h3>Kubernetes Pods</h3>
        <ul id="pods"></ul>
    </div>

    <div class="card">
        <h3>Alerts</h3>
        <p id="alert"></p>
        <button onclick="simulateFailure()">Simulate Failure</button>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
