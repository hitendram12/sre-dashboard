<!DOCTYPE html>
<html>
<head>
    <title>SRE Platform | Hitendra</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🚀 SRE Platform Dashboard</h1>
</header>

<nav>
    <button onclick="showTab('dashboard')">Dashboard</button>
    <button onclick="showTab('infra')">Terraform</button>
    <button onclick="showTab('cicd')">CI/CD</button>
    <button onclick="showTab('services')">Services</button>
</nav>

<!-- DASHBOARD -->
<section id="dashboard" class="tab">
    <h2>📊 Metrics</h2>
    <canvas id="cpuChart"></canvas>
    <canvas id="memoryChart"></canvas>

    <h3>Kubernetes Pods</h3>
    <ul id="pods"></ul>
</section>

<!-- TERRAFORM -->
<section id="infra" class="tab hidden">
    <h2>🌍 Infrastructure (Terraform)</h2>
    <div id="infraView"></div>
</section>

<!-- CI/CD -->
<section id="cicd" class="tab hidden">
    <h2>⚙️ CI/CD Pipeline</h2>
    <div id="pipeline"></div>
    <button onclick="runPipeline()">Run Pipeline</button>
</section>

<!-- SERVICES -->
<section id="services" class="tab hidden">
    <h2>🧩 Services</h2>
    <ul id="servicesList"></ul>
</section>

<script src="app.js"></script>
<script src="charts.js"></script>
<script src="terraform.js"></script>
<script src="cicd.js"></script>
<script src="services.js"></script>

</body>
</html>
